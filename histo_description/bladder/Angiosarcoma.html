<div class="block_section spbt_16" id="microscopichistologicdescription18826"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Anastomosing vascular channels lined by plump hyperchromatic cells
</li><li>Also solid growth and epithelioid cytology
</li><li>Typically invades the muscularis propria (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/18580491" target="_blank">Am J Surg Pathol 2008;32:1213</a>)

</li></ul>
