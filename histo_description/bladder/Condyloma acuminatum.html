<div class="block_section spbt_16" id="microscopichistologicdescription172380"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Exophytic lesion
</li><li> Nonkeratinizing, hyperplastic papillary fronds of squamous epithelium 
</li><li> Lack free floating papillary fronds 
</li><li> Cells with koilocytosis and viral atypia (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/16819332" target="_blank">Am J Surg Pathol 2006;30:883</a>)

</li></ul></div></div>
