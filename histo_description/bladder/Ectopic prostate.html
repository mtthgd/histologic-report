<div class="block_section spbt_16" id="microscopichistologicdescription10766"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Prostatic-like glands with luminal secretions beneath partially/totally denudated urothelium
</li><li>May be associated with cystitis cystica and cystitis glandularis
</li><li>Prostate-specific immunohistochemical markers are confirmatory but not mandatory

</li></ul></div></div>
