<div class="block_section spbt_16" id="microscopichistologicdescription117996"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Large signet ring lipoblast-like cells with single or multiple clear cytoplasmic vacuoles indenting the nucleus (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/26935559" target="_blank">Eur Urol 2016;70:93</a>)

</li><li> Lipid component comprises 10 - 50% of the tumor (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/20139762" target="_blank">Am J Surg Pathol 2010;34:371</a>)

</li></ul></div></div>
