<div class="block_section spbt_16" id="microscopichistologicdescription19473"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Myxomatous stroma with scattered, small, blue malignant cells, usually compressed beneath intact urothelium (cambium layer)
</li><li>Cross striations are often difficult to identify in untreated cases
