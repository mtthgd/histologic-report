<div class="block_section spbt_16" id="microscopichistologicdescription320028"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Lobular pattern composed of groups and clusters of osteoclast-like multinucleated giant cells
</li><li>Vascular fibroblastic stroma 
</li><li>Hemorrhage and hemosiderin deposits
