<div class="block_section spbt_16" id="microscopichistologicdescription163313"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Chronic papillary synovitis with hyperplasia, fibrin deposition, mononuclear cell infiltrates, onion skin thickening of arterial walls; resembles rheumatoid arthritis 
</li><li> Perineuritis may be present
</li></ul>
