<div class="block_section spbt_16" id="microscopichistologicdescription23924"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Severe forms lack an organized trabecular pattern
</li><li>Crowded osteocytes within bone (due to reduced collagen synthesis)
</li><li>Large areas of woven bone
</li><li>Less severe forms still have crowded osteocytes with thin lamellar bone 

</li></ul>
