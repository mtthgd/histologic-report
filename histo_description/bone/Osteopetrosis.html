<div class="block_section spbt_16" id="microscopichistologicdescription104483"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Primarily woven bone since bone is not remodeled
</li><li>Central core of cartilage with dense and irregular bony trabeculae
</li><li>Often abundant osteoclasts
</li><li>Reduced marrow space

</li></ul>
