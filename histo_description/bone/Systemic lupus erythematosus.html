<div class="block_section spbt_16" id="microscopichistologicdescription163804"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Changes resemble rheumatoid arthritis but with more intense surface fibrin deposition and less synovial proliferation and less intense inflammation 
</li><li> Occasional vasculitis can be seen (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/4931742" target="_blank">Ann Intern Med 1971;74:911</a>)
</li></ul>
