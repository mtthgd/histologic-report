<div class="block_section spbt_16" id="microscopichistologicdescription51850"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Bone marrow biopsies are helpful to determine cellularity and presence of fibrosis
</li><li>Purple granular deposits that impair evaluation of touch preparations are due to cartilage in biopsy and are more common in children (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/14600144" target="_blank">J Clin Pathol 2003;56:883</a>) 

</li></ul></div></div>
