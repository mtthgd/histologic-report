<div class="block_section spbt_16" id="microscopichistologicdescription51669"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Giant inclusion bodies in leukocyte precursor cells (bodies contain lysosomal enzymes)
</li><li>Also hemophagocytosis (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/16304363" target="_blank">Hematology Am Soc Hematol Educ Program 2005;1:82</a>)
</li><li><b>Peripheral smear:</b> giant granules in neutrophils, eosinophils and granulocytes</li></ul>
</div></div>
