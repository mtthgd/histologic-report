<div class="block_section spbt_16" id="microscopichistologicdescription52531"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>On trephine biopsy, disruption of normal bone marrow architecture with considerable loss of fat spaces
</li><li><b>Early:</b> nuclear pyknosis and karyorrhexis
</li><li><b>Late:</b> all cell outlines gone, serous transformation of marrow 

</li></ul></div></div>
