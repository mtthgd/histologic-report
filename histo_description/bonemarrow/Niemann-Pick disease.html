<div class="block_section spbt_16" id="microscopichistologicdescription51787"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Clusters and individual foam cells up to 90 microns
</li><li>Cytoplasm has clear vacuoles of varying size, may be mulberry or soap bubble-like
</li><li>Nuclei are small and round with coarse chromatin

</li></ul></div></div>
