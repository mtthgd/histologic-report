<div class="block_section spbt_16" id="microscopichistologicdescription453375"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Marked erythroblast hypoplasia, immature giant erythroblasts
</li><li>Occasional erythroblasts may have intranuclear inclusions with surrounding rim of residual chromatin
</li><li>Rarely hemophagocytosis (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/15973005" target="_blank">Jpn J Infect Dis 2005;58:149</a>)

</li></ul></div></div>
