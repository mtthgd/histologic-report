<div class="block_section spbt_16" id="microscopichistologicdescription52629"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Focal, poorly circumscribed, randomly distributed lymphoid aggregates
</li><li>Lymphocytes may be irregular and accompanied by plasma cells, immunoblasts, eosinophils, endothelial cells, mast cells, histiocytes and epithelioid histiocytes 

</li></ul></div></div>
