<div class="block_section spbt_16" id="microscopichistologicdescription52340"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Megakaryocytes and megakaryocyte precursors are absent or extremely scarce
</li><li>Stains for antiplatelet membrane glycoproteins do not detect small immature megakaryocytes
</li><li>Bone marrow may show erythroid hyperplasia if significant bleeding has occurred

</li></ul></div></div>
