<div class="block_section spbt_16" id="microscopichistologicdescription84739"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Leukemic cells are often promonocytes with less basophilic cytoplasm and more azurophilic granules than monoblasts 
</li><li> Have folded or cerebriform nuclei with fine chromatin 
</li><li> Erythrophagocytosis is common
</li></ul></div></div>
