<div class="block_section spbt_16" id="microscopichistologicdescription92627"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Pale pink, extracellular, glassy, hyaline material on H&amp;E staining, mostly deposited in vascular or perivascular location
</li><li>	Characteristic cracking artifact
</li><li>	Macrophages and foreign body giant cells may be found around deposits




</li></ul>
</div></div>
