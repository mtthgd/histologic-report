<div class="block_section spbt_16" id="microscopichistologicdescription468290"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Cells with serous differentiation containing zymogen granules in the cytoplasm that stain with PASD
</li><li>Predominantly solid or microglandular growth but may be cystic, trabecular or show other growth patterns (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/36332545" target="_blank">Breast 2022;66:208</a>)

</li></ul></div></div>
