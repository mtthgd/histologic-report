<div class="block_section spbt_16" id="microscopichistologicdescription157469"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Amorphous eosinophilic extracellular deposits in fat, stroma or vessels
</li><li> May cause ductal atrophy, form rings around individual fat cells, have associated multinucleated giant cell reaction or osseous metaplasia (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/12147664" target="_blank">J Clin Path 2002;55:634</a>)
</li></ul></div></div>
