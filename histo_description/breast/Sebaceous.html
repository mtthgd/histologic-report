<div class="block_section spbt_16" id="microscopichistologicdescription541112"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Well defined solid sheets or lobules of atypical epithelial cells, including large, pale or clear cells with coarsely vacuolated cytoplasm, containing Oil red O staining lipid and often scalloped nuclei

</li><li> Often focal squamous morules

</li></ul></div></div>
