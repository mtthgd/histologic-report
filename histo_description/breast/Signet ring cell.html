<div class="block_section spbt_16" id="microscopichistologicdescription541120"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Mucin fills cytoplasm and displaces nucleus
</li><li> Usually coexists with invasive ductal NOS
</li><li> High nuclear grade; DCIS may be present, but no lobular features (by definition) 

</li></ul></div></div>
