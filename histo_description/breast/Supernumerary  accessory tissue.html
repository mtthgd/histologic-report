<div class="block_section spbt_16" id="microscopichistologicdescription429038"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Same histologic features as normal nipple, including hyperpigmentation, slight hyperkeratosis, pilosebaceous structure of Montgomery tubercles, smooth muscle, Toker cells and possibly breast lobules and ducts (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/12680957" target="_blank">J Cutan Pathol 2003;30:256</a>)


</li></ul></div></div>
