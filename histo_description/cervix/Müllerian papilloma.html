<div class="block_section spbt_16" id="microscopichistologicdescription116662"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Superficially located, composed of papillary stalks covered by mucinous epithelium with focal squamous metaplasia
</li><li>Stroma is highly cellular fibrous tissue
</li><li>No atypia, minimal mitotic activity
</li></ul></div></div>
