<div class="block_section spbt_16" id="microscopichistologicdescription365315"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Epithelioid to spindle shaped cells embedded in a desmoplastic stroma and loose myxoid matrix
</li><li> Rhabdoid cells may be rare
</li><li> No high grade / malignant features such as brisk mitotic activity and tumor necrosis
</li><li> Reference: <a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/31732806" target="_blank">Acta Neuropathol 2020;139:277</a>
</li></ul></div></div>
