<div class="block_section spbt_16" id="microscopichistologicdescription145232"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Crypts are 2 - 3x larger and more dilated than normal crypts, may have a foci of dysplasia
</li><li> ACF can be subclassified as dysplastic, nondysplastic or mixed type
</li><li> Dysplastic ACF resemble adenomas 

</li></ul>
