<div class="block_section spbt_16" id="microscopichistologicdescription283574"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Colon polyps: nondysplastic epithelium, dilated glands, expanded stroma; histologically similar to juvenile polyps; may also show intramucosal lipomas (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/29192650" target="_blank">Mod Pathol 2018;31:643</a>)
