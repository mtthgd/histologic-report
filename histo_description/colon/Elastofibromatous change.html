<div class="block_section spbt_16" id="microscopichistologicdescription283157"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Eosinophilic to gray amorphous material, sometimes with fibrous tissue, involving submocusa or muscularis mucosae

</li><li> May be centered around blood vessels (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/15323140" target="_blank">Am J Clin Pathol 2004;122:232</a>) 

</li></ul></div></div>
