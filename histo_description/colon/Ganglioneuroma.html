<div class="block_section spbt_16" id="microscopichistologicdescription271551"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Expansion of the lamina propria by bland spindled mesenchymal cells (Schwann cells), lacking atypia or mitotic figures
</li><li> Ganglion cells present within the expanded region; may be rare or abundant

</li></ul></div></div>
