<div class="block_section spbt_16" id="microscopichistologicdescription271666"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Storiform fibrotic process infiltrated by eosinophils and IgG4 positive plasma cells (which may be sparse)
</li><li>May show obliterative phlebitis, fat necrosis
</li><li>Similar findings may be observed in lymph nodes (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/8604685" target="_blank">Am J Clin Pathol 1996;105:430</a>)

</li></ul></div></div>
