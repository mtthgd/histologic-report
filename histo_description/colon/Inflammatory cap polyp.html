<div class="block_section spbt_16" id="microscopichistologicdescription233472"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Inflamed mucosa with tortuous, elongated crypts attenuated towards the mucosal surface with abundant inflammation in the lamina propria and characteristic "cap" of inflamed and ulcerated granulation tissue on the mucosal surface 

</li></ul></div></div>
