<div class="block_section spbt_16" id="microscopichistologicdescription272156"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Lamina propria based lesion composed of spindle cells with mild to moderate atypia, arranged in vague fascicles and separated by slit-like vessels 

</li><li> Extravasated red blood cells common

</li><li> PAS positive, diastase resistant hyaline globules sometimes seen

</li></ul></div></div>
