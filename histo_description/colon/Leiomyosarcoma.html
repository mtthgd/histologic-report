<div class="block_section spbt_16" id="microscopichistologicdescription261747"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Resembles leiomyosarcoma at other sites: malignant smooth muscle cells with prominent nuclear atypia, coagulative necrosis and at least 1 mitosis per 10 high power fields

</li><li> Rare examples have osteoclast-like giant cells (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/15043462" target="_blank">Arch Pathol Lab Med 2004;128:440</a>)

</li></ul></div></div>
