<div class="block_section spbt_16" id="microscopichistologicdescription499441"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Tumoral features suggestive of MSI-H etiology include: tumor infiltrating lymphocytes and peritumoral lymphocytes, Crohn's-like lymphoid reaction, mucinous features, medullary features, tumoral heterogeneity and absence of dirty necrosis
</li></ul></div></div>
