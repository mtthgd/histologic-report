<div class="block_section spbt_16" id="microscopichistologicdescription262239"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Disease usually resembles primary tumor microscopically
</li><li>Metastases may be present along serosal surface or within the wall but mucosal involvement is uncommon
</li><li>Adjacent / overlying colonic epithelium is not dysplastic

</li></ul></div></div>
