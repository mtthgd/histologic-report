<div class="block_section spbt_16" id="microscopichistologicdescription529946"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Adenocarcinoma with strips of tumor cells floating in large extracellular mucin lakes comprising at least half of tumor mass
</li><li>Signet ring cells (with intracellular mucin) may also be present but should comprise less than half of tumor

</li></ul></div></div>
