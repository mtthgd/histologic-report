<div class="block_section spbt_16" id="microscopichistologicdescription263252"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Empty submucosal cysts lined by multinucleated giant cells

</li><li> Mucosa may demonstrate cryptitis, crypt abscesses, granulomas

</li><li> Can also resemble lipomatosis

</li></ul></div></div>
