<div class="block_section spbt_16" id="microscopichistologicdescription266761"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Similar to squamous cell carcinoma in other organs (polygonal eosinophilic cells with intercellular bridges and keratin formation)
</li><li>Can be poorly differentiated
</li><li>May be basaloid or acantholytic 

</li></ul></div></div>
