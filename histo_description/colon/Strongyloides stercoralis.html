<div class="block_section spbt_16" id="microscopichistologicdescription497513"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Tissue eosinophilia and granulocytic infiltration that may cause abscess formation are present 
</li><li>Adult worms or larvae may be found within crypts 
</li><li>Necrosis or granulomas may be present 
</li><li>Ulcers with fissuring similar to Crohn’s disease may occur

</li></ul>
</div></div>
