<div class="block_section spbt_16" id="microscopichistologicdescription274827"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Mature sebaceous glands characterized by large polygonal cells with clear, vacuolated cytoplasm within the lamina propria
</li><li>A squamous lined excretory duct may also be present
</li><li>Associated hair follicles or other skin appendages are absent

</li></ul></div></div>
