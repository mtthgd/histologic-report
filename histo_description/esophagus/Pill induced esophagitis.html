<div class="block_section spbt_16" id="microscopichistologicdescription131744"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Inflammatory exudate, ulceration, inflamed granulation tissue, prominent eosinophils, necrotic squamous epithelium, polarizable crystalline foreign material, multinucleated giant cells
</li><li>Fungi or viral inclusions present in 20% of cases due to alendronate

</li></ul></div></div>
