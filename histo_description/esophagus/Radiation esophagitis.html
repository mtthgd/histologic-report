<div class="block_section spbt_16" id="microscopichistologicdescription131858"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Variably sized cells in all layers, often increased cytoplasm but usually normal nuclear to cytoplasmic ratio
</li><li>Nuclei enlarged with bizarre shapes, may be hyperchromatic or smudged
</li><li>May have large eosinophilic nucleoli; usually no mitotic figures

</li></ul></div></div>
