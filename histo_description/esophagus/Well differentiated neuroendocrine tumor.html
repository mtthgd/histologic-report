<div class="block_section spbt_16" id="microscopichistologicdescription133662"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Well differentiated (low grade) tumor
<ul><li>Uniform, small, bland tumor cells in solid, trabecular, gyriform or glandular pattern
</li><li>May have Paneth cell differentiation</li></ul>
</li><li>Solid to cribriform growth
</li><li>Usually in lamina propria

</li></ul></div></div>
