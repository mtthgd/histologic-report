<div class="block_section spbt_16" id="microscopichistologicdescription461449"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Ulceration, necrosis, heavy neutrophil and macrophage infiltrates
</li><li> May have granulomatous inflammation
</li><li> Encysted forms
</li><li> Typically, absence of lymphocytes (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/23332929" target="_blank">Hum Pathol 2013;44:918</a>)
</li></ul></div></div>
