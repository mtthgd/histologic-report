<div class="block_section spbt_16" id="microscopichistologicdescription283456"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><b>Graft failure:</b>
<ul>
<li>Fibrosis, vascularization, inflammatory cell infiltrate
</li><li>Full thickness scars from prior surgery are present at edge of specimen
</li><li>50% have fibrous retrocorneal membrane
</li></ul></div></div>
