<div class="block_section spbt_16" id="microscopichistologicdescription396263"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Early changes are degeneration of outer retinal layers and photoreceptors with subretinal exudates
</li><li>Late changes are disruption and atrophy of retinal architecture with marked gliosis and proliferative vitreoretinopathy
</li></ul>
</div></div>
