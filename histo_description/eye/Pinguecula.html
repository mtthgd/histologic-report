<div class="block_section spbt_16" id="microscopichistologicdescription66981"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>    Band of subepithelial actinic elastosis with variable hyalinization and calcification
 </li><li>   May have acanthosis or dyskeratosis resembling carcinoma
 </li><li>   May have foreign body giant cell reaction around elastotic material (actinic granuloma) 

</li></ul></div></div>
