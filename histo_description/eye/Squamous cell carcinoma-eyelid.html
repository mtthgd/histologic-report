<div class="block_section spbt_16" id="microscopichistologicdescription90855"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Invasion of malignant squamous cells into dermis
</li><li>Cells are large and eosinophilic with marked atypia
</li><li>Often abnormal deep keratinization, may have keratin pearls
</li></ul></div></div>
