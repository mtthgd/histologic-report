<div class="block_section spbt_16" id="microscopichistologicdescription294867"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Acute phase (day of admission)
<ul>
<li> Hypertrophied myocytes (&gt; 20 μm)
</li><li> Intracytoplasmic glycogen + PAS staining
</li></ul>
</li><li> Recovery phase (12 ± 3 days after admission)
<ul>
<li> Reduced PAS staining (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/17395683" target="_blank">Eur Heart J 2007;28:2456</a>)

</li></ul>
</li></ul></div></div>
