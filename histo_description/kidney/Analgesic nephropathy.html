<div class="block_section spbt_16" id="microscopichistologicdescription180503"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> <b>Early</b>: papillae have patchy necrosis
</li><li> <b>Later</b>: papillae are diffusely necrotic with ghost tubules and dystrophic calcification; renal columns of Berlin are usually spared from tubular atrophy; small vessels have basement membrane thickening
</li></ul></div></div>
