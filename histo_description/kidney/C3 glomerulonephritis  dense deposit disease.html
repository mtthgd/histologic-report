<div class="block_section spbt_16" id="microscopichistologicdescription208548"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Varied glomerular pathology (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/17396142" target="_blank">Mod Pathol 2007;20:605</a>): 
<ul>
<li>Mesangial proliferation (30 - 50%)
</li><li>Membranoproliferative glomerulonephritis (25 - 45%)
</li><li>Acute exudative glomerulonephritis (10 - 20%)
</li><li>Crescentic glomerulonephritis (10 - 20%)
</li></ul>
</li></ul></div></div>
