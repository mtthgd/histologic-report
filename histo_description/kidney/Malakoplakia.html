<div class="block_section spbt_16" id="microscopichistologicdescription180759"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Foamy macrophages with PAS+ granular cytoplasm due to phagosomes stuffed with bacterial debris and Michaelis-Gutmann bodies (laminated mineralized concretions)
 </li><li> May have rare Michaelis-Gutmann bodies, late fibrous stage (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/2919720" target="_blank">Am J Surg Pathol 1989;13:225</a>) 
</li></ul></div></div>
