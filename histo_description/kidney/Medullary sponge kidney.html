<div class="block_section spbt_16" id="microscopichistologicdescription360440"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Medullary cysts lined by cuboidal epithelium or urothelium
</li><li> May have concretions adherent to cyst wall
</li><li> Often severe inflammation and scarring in interstitium, often with tubular atrophy near papillary tips

</li></ul></div></div>
