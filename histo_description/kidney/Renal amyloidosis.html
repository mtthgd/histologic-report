<div class="block_section spbt_16" id="microscopichistologicdescription363529"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Pale eosinophilic, amorphous and extracellular material on H&amp;E and PAS stains, typically silver negative and gray-blue on trichrome
