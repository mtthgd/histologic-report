<div class="block_section spbt_16" id="microscopichistologicdescription365432"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Arranged in intersecting fascicles
</li><li>Spindle cells with blunt ended, cigar shaped nuclei and eosinophilic cytoplasm 
</li><li>Minimal to no nuclear pleomorphism / atypia
</li><li>Low mitotic activity
</li><li>No necrosis
</li><li>Reference: <a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/27276240" target="_blank">Am J Surg Pathol 2016;40:1557</a>
</li></ul></div></div>
