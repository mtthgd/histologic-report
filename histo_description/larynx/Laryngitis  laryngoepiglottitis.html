<div class="block_section spbt_16" id="microscopichistologicdescription412244"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><b>Acute laryngoepiglottitis</b>
<ul>
<li>Acute inflammatory infiltrate with edema, extending to adjacent soft tissues
</li></ul><br/>
<b>Chronic (nonspecific) laryngitis</b>
<ul>
<li>Lymphocytic infiltrate with variable plasma cells and histiocytes
</li><li>Variable epithelial hyperplasia
</li></ul></div></div>
