<div class="block_section spbt_16" id="microscopichistologicdescription167074"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Dilated, peripherally located bile ductular reaction that contains inspissated bile 
</li><li>Other common findings include portal tract inflammation, duct injury, hepatocyte ballooning or necrosis and canalicular cholestasis (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/28984672" target="_blank">Am J Surg Pathol 2017;41:1607</a>)
