<div class="block_section spbt_16" id="microscopichistologicdescription169140"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Dilation and fibrosis of bile ducts with acute or chronic inflammation (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/21654363" target="_blank">Adv Anat Pathol 2011;18:318</a>)
</li><li> Other findings include hepatic / intraductal abscesses and secondary sclerosing cholangitis
</li><li> Liver flukes or bile duct stones may be seen

</li></ul></div></div>
