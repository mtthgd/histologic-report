<div class="block_section spbt_16" id="microscopichistologicdescription67267"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Nested, trabecular or microacinar architecture

</li><li> Composed of small, uniform tumor cells with granular chromatin and round nuclei

</li><li> Often stromal hyalinization

</li></ul></div></div>
