<div class="block_section spbt_16" id="microscopichistologicdescription42053"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Large and medium bronchi infiltrated by neutrophils, eosinophils and necrotic debris surrounded by foreign body giant cells

</li><li> Fragmented elastic tissue (with elastic stain)

</li><li> Also bronchiolitis obliterans

</li><li> No fibrinoid necrosis of vessels

</li></ul></div></div>
