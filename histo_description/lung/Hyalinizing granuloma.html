<div class="block_section spbt_16" id="microscopichistologicdescription42057"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Central keloid-like collagen, arranged in whorls, surrounded by foreign body giant cells simulating nodular amyloidosis

</li><li> May have plasma cells and lymphocytes between collagenous bands

</li><li> Usually no epithelioid granulomas, no necrosis

</li></ul></div></div>
