<div class="block_section spbt_16" id="microscopichistologicdescription2951"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Mature adipose tissue underlying respiratory epithelium, with scattered lymphocytes and histiocytes 
</li><li>May show fibrosis and hyperchromatic stromal cells
</li><li>Rarely has osteocartilaginous metaplasia

</li></ul>
