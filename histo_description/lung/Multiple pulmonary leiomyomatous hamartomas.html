<div class="block_section spbt_16" id="microscopichistologicdescription21588"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Excessive smooth muscle bundles in fascicles, not associated with tumor
</li><li> Spindle cells with eosinophilic, fibrillary cytoplasm and blunt, elongated nuclei
</li><li> Scattered glands and duct-like spaces may be seen
</li><li> No mitoses, no nuclear atypia
</li></ul></div></div>
