<div class="block_section spbt_16" id="microscopichistologicdescription41836"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Focal bronchopneumonia with microabscesses, variable histiocytic response and ill defined granulomas

</li><li> If identified by anatomic pathologist, <b>clinical microbiology laboratory should be notified</b> as routine culture may not isolate the organism

</li></ul></div></div>
