<div class="block_section spbt_16" id="microscopichistologicdescription79556"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Criteria are ill defined but traditionally are acute congestion of red pulp with numerous neutrophils in red and white pulp
</li><li>Necrosis of follicles occurs with group A streptococcal infection
</li><li>No capsular invasion by immunoblasts

</li></ul></div></div>
