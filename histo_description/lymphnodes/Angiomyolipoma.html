<div class="block_section spbt_16" id="microscopichistologicdescription232577"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Haphazard adipose tissue and smooth muscle cells radiating from thick walled blood vessels 
</li><li>Ranges from sinusoidal involvement to massive replacement of nodal parenchyma
</li><li>Smooth muscle may be epithelioid or pleomorphic
</li><li>Infrequent mitoses 

</li></ul></div></div>
