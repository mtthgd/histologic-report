<div class="block_section spbt_16" id="microscopichistologicdescription98536"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Resembles hemangiomas at other sites
</li><li>Discrete mass lesion, either capillary or cavernous
</li><li>May be highly cellular or epithelioid
</li></ul></div></div>
