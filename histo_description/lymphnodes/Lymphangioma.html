<div class="block_section spbt_16" id="microscopichistologicdescription98454"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Dilated, thin walled lymphatic vessels, lined by attenuated endothelial cells
</li><li>Lumina are empty or filled with proteinaceous material, lymphocytes or erythrocytes
</li><li>Surrounding stroma shows lymphocytic infiltrate

</li></ul></div></div>
