<div class="block_section spbt_16" id="microscopichistologicdescription371270"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Small islands and cords of markedly attenuated ameloblastic epithelium two cells thick within dense collagenous stroma that is often immature
</li><li>Occasional dentin or cementum production and stellate reticulum
</li><li>Also granular cell variant 

</li></ul></div></div>
