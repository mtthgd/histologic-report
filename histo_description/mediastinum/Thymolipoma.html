<div class="block_section spbt_16" id="microscopichistologicdescription97229"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Thin fibrous capsule surrounding lobules of mature adipose tissue intimately associated with unremarkable thymic tissue containing cortex, medulla and Hassall corpuscles
</li><li>May have thymic epithelial proliferation, myoid cells, zones of dense fibrosis 

</li></ul>
</div></div>
