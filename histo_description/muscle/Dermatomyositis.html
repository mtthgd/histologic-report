<div class="block_section spbt_16" id="microscopichistologicdescription235013"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Perifascicular atrophy is the hallmark of dermatomyositis 
</li><li>Muscle may have altered muscle fiber sizes, but there is less of a tendency to hypertrophy muscle fibers (more common in dystrophy)
</li><li>May be increased internal nuclei and basophilic myofibers 


</li></ul></div></div>
