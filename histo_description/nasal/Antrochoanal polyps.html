<div class="block_section spbt_16" id="microscopichistologicdescription92676"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Thin surface mucosa with no thickened basement membrane
</li><li>Stroma with stellate cells, less edema and fewer glands than inflammatory polyp
</li><li>May have prominent dilated vessels with thrombosis or infarct
</li><li>Prominent eosinophils in only 20%

</li></ul></div></div>
