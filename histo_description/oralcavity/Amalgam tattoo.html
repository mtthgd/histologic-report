<div class="block_section spbt_16" id="microscopichistologicdescription349227"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Large black deposits of foreign material with or without a chronic inflammatory response in the connective tissue 
</li><li>Fine black granules in the connective tissue; may demonstrate affinity for reticulin fibers (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/30671761" target="_blank">Head Neck Pathol 2019;13:47</a>)

</li></ul></div></div>
