<div class="block_section spbt_16" id="microscopichistologicdescription370764"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Nodule or collapsed nodule surfaced by keratinized squamous epithelium and comprised of edematous granulation tissue (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/26380825" target="_blank">World J Clin Cases 2015;3:779</a>)
</li><li>Collections or linear tracts of neutrophils are present and often extend to the base of the specimen
</li></ul></div></div>
