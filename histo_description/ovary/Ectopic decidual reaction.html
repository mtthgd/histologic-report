<div class="block_section spbt_16" id="microscopichistologicdescription484079"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Large polygonal cells with abundant eosinophilic cytoplasm, bland nuclei and visible nucleoli 
</li><li> No glands present (to differentiate it from decidualized endometriosis)
</li><li> Reference: <a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/25960900" target="_blank">Case Rep Obstet Gynecol 2015;2015:217367</a>
</li></ul></div></div>
