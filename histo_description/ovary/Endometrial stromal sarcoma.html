<div class="block_section spbt_16" id="microscopichistologicdescription116888"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>High or low grade
</li><li>Low grade: infiltrative and diffuse proliferation of uniform round or oval cells, abundant small vessels
</li><li>Undifferentiated: pleomorphic round / oval to spindled cells, high mitotic rate, necrosis
