<div class="block_section spbt_16" id="microscopichistologicdescription268906"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Typically appears as a thick fibrous wall with neuroendocrine cells lining the central cystic space and sometimes forming nests or vesicular structures within the fibrosis  (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/11395552" target="_blank">Am J Surg Pathol 2001;25:752</a>)
</li><li>Necrosis and lymphovascular invasion are uncommon

</li></ul></div></div>
