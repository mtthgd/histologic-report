<div class="block_section spbt_16" id="microscopichistologicdescription62887"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Villous stromal edema with erythroblastosis (increased fetal nucleated red cells) and possibly intravillous hematopoiesis

</li><li> No trophoblastic hyperplasia or cisterns (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/4018776" target="_blank">Hum Pathol 1985;16:785</a>)

</li></ul></div></div>
