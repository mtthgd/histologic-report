<div class="block_section spbt_16" id="microscopichistologicdescription63104"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Changes are typically minimal unless evidence of significant hemorrhage or thrombosis is present
</li><li>Veins may be thickened or contain mural "cushions," which are myxoid appearing, often fusiform shaped regions of intramural fibrin
</li></ul>
