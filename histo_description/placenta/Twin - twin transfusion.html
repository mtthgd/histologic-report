<div class="block_section spbt_16" id="microscopichistologicdescription62965"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Donor placentas have large edematous villi, small capillaries and numerous nucleated red blood cells

</li><li> Recipient placenta has small, firm and mature villi with congested vessels

</li></ul>
