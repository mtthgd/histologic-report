<div class="block_section spbt_16" id="microscopichistologicdescription223147"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Tumor cells float in pools of mucin
</li><li> Resembles mucinous (colloid) carcinoma of breast
</li><li> Has microglandular, cribriform, comedo, solid and hypernephroid patterns
</li><li> Signet ring cells are rare

</li></ul>
</div></div>
