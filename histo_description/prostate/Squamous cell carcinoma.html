<div class="block_section spbt_16" id="microscopichistologicdescription453943"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>	Pure tumors exhibit infiltrating nests, strands and sheets of polygonal cells with nuclear atypia
</li><li>	Squamous differentiation is manifested as individual cell keratinization, intercellular bridges or keratin pearl formation
