<div class="block_section spbt_16" id="microscopichistologicdescription94707"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Crowded small acinar proliferation, usually arranged in a well circumscribed nodule
</li><li>The glands can have intraluminal concretions that vary in color from orange to gray or green
</li><li>May be seen underlying the urethral urothelium
</li></ul></div></div>
