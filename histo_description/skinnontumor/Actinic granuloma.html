<div class="block_section spbt_16" id="microscopichistologicdescription209413"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Dermis in region of rim has histiocytes and foreign body giant cells engulfing elastotic fibers (elastoclasis)
</li><li> Also variable lymphocytes, plasma cells and eosinophils
</li><li> Usually no necrobiosis, no increased dermal mucin

</li></ul></div></div>
