<div class="block_section spbt_16" id="microscopichistologicdescription217664"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Superficial folliculitis has moderate inflammatory cells in the follicular ostium and upper regions of the follicle
</li><li> Infiltrate initially consists of neutrophils, later becomes more mixed with lymphocytes and macrophages
