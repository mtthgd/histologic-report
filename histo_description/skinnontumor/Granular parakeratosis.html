<div class="block_section spbt_16" id="microscopichistologicdescription420270"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>H&amp;E shows thickened stratum corneum with abnormal retention of keratohyalin granules and parakeratosis
</li><li>Subjacent epidermis may reveal acanthosis and mild spongiosis
</li><li>Reference: <a class="bl" href="http://www.amazon.com/exec/obidos/ASIN/0702069833/pathologyoutl-20">Calonje: McKee's Pathology of the Skin, 5th Edition, 2019</a>
</li></ul></div></div>
