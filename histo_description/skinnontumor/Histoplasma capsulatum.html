<div class="block_section spbt_16" id="microscopichistologicdescription217861"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Isolated intracellular organisms and large aggregates surrounded by chronic inflammatory cells and fibroblasts (but no neutrophils or eosinophils); also epithelioid granulomas with variable caseation
</li><li> May be narrow based budding of spores

</li></ul></div></div>
