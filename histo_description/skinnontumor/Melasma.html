<div class="block_section spbt_16" id="microscopichistologicdescription141631"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Mild lymphohistiocytic infiltrate in 75%
</li><li>Increase in epidermal melanin but no increase in number of melanocytes
</li><li>Melanocytes are larger with prominent dendrites (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/15798432" target="_blank">Am J Dermatopathol 2005;27:96</a>)

</li></ul></div></div>
