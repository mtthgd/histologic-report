<div class="block_section spbt_16" id="microscopichistologicdescription217809"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Marked pseudoepitheliomatous hyperplasia of epidermis
</li><li> Granulomatous and neutrophilic infiltrate
</li><li> Fungi are within giant cells
</li><li> <i>Blastomyces dermatitidis</i> is a 12 micron, spherical, double-contoured yeast with broad based buds

</li></ul></div></div>
