<div class="block_section spbt_16" id="microscopichistologicdescription211104"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Similar to bullous pemphigoid - subepidermal blister, with eosinophils in lumen
</li><li> Marked edema in papillary dermis
</li><li> Perivascular infiltrate consists of lymphocytes, histiocytes and large numbers of eosinophils
</li><li> Eosinophilic spongiosis may be seen

</li></ul></div></div>
