<div class="block_section spbt_16" id="microscopichistologicdescription242116"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> May or may not contain a blister (separation of the layers of the skin)

</li><li> If blister present, may be subcorneal, intraepidermal (suprabasilar) or subepidermal

</li><li> Level and content of inflammation varies


</li></ul>
