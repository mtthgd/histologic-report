<div class="block_section spbt_16" id="microscopichistologicdescription24211"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Whorls or dissecting pattern of meningothelial cells in dermis and subcutis
</li><li> Often psammoma bodies and cartilage
</li><li> Center of lesion may have long cleft
</li><li> Adipose tissue, blood vessels, nerves admixed with lesion

</li></ul></div></div>
