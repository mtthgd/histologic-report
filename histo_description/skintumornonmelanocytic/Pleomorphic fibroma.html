<div class="block_section spbt_16" id="microscopichistologicdescription234143"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Resembles fibroepithelial polyp but with enlarged, bizarre, smudged, hyperchromatic nuclei, thick collagen bundles and rare mitotic figures; may be sclerotic (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/11803283" target="_blank">Am J Dermatopathol 2002;24:54</a>) or have myxoid foci (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/9790115" target="_blank">Am J Dermatopathol 1998;20:502</a>)
</li></ul></div></div>
