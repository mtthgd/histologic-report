<div class="block_section spbt_16" id="microscopichistologicdescription527786"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Unencapsulated dermal nodule
</li><li>Attenuated overlying epidermis
</li><li>Starry night or plywood appearance of whorled thickened collagen bundles (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/18544068" target="_blank">J Cutan Pathol 2008;35:74</a>)
</li><li>Low cellularity
</li><li>Absent elastic fibers
</li><li>Stromal mucin may be present
</li></ul></div></div>
