<div class="block_section spbt_16" id="microscopichistologicdescription527219"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Dilated vessel(s)
</li><li>Single layer of endothelium
</li><li>Typically no elastin or smooth muscle 
</li><li>With or without thrombus
</li><li>Background solar elastosis (due to tendency to arise in sun damaged sites) (<a class="bl" href="https://www.ncbi.nlm.nih.gov/pubmed/9344191" target="_blank">J Am Acad Dermatol 1997;37:523</a>)
</li></ul></div></div>
