<div class="block_section spbt_16" id="microscopichistologicdescription8668"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Well circumscribed, nodular proliferation of smooth muscle cells, ducts and glands, clearly disorganized compared to normal
</li><li>Ducts and glands are lined by columnar/cuboidal cells
</li><li>No atypia, no mitoses, usually no pancreatic tissue

</li></ul></div></div>
