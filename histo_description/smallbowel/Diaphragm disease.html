<div class="block_section spbt_16" id="microscopichistologicdescription77188"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Thin circumferential membranes resembling plica circularis, composed of mucosa and submucosa with accompanying fibrosis

</li><li>  Neuromuscular and vascular hamartoma-like changes, eosinophilic enteritis and acute inflammation (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/18794043" target="_blank">Am J Clin Pathol 2008;130:518</a>)

</li></ul></div></div>
