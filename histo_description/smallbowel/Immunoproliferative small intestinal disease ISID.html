<div class="block_section spbt_16" id="microscopichistologicdescription78507"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><b>Low grade:</b>
<ul>
<li> Heavy lymphoplasmacytic infiltrate by mature cells

</li></ul><br/>
<b>High grade:</b>
<ul>
<li> Resembles diffuse large cell lymphoma with plasmacytoid features

</li><li> May have starry sky pattern, follicular hyperplasia

</li></ul></div></div>
