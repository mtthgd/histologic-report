<div class="block_section spbt_16" id="microscopichistologicdescription78058"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Solitary small polyps of inflamed regenerating mucosa in a fibroblastic or granulation tissue stroma

</li><li> No / few mitotic figures, no atypical mitotic figures, often zonation

</li><li> May have bizarre stromal changes resembling sarcoma

</li></ul>
