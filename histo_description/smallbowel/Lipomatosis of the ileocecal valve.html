<div class="block_section spbt_16" id="microscopichistologicdescription156759"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>	Ileocecal valve mucosa with extensive submucosal proliferation of lipomatous mature adipocytes
</li><li>	Fibrous septa and vascular congestion are usually present
</li><li>	No surrounding fibrous capsule
</li></ul></div></div>
