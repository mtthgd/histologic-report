<div class="block_section spbt_16" id="microscopichistologicdescription79411"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Sheets or nests of oval / spindled mesenchymal cells with clear or eosinophilic cytoplasm, visible nucleoli and often mitoses
</li><li> Osteoclast-like giant cells may be seen
</li><li> Tumor often spans the entire wall


</li></ul></div></div>
