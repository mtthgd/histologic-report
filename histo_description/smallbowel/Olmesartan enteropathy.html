<div class="block_section spbt_16" id="microscopichistologicdescription163497"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>	Partial or total villous atrophy
</li><li>	Increased intraepithelial lymphocytes (&gt; 25 - 30 IEL/100 enterocytes) 
</li><li>	Crypt hyperplasia
</li><li>	Variable active inflammation 
</li><li>	With or without thick band of subepithelial collagen deposition (collagenous sprue pattern)

</li></ul></div></div>
