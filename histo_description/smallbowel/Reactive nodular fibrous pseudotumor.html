<div class="block_section spbt_16" id="microscopichistologicdescription78248"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Low / moderate cellularity

</li><li> Spindled fibroblasts arranged haphazardly or in intersecting fascicles

</li><li> Often infiltrative borders

</li><li> Stroma rich in wire-like, keloidal or hyalinized collagen

</li><li> Peripheral lymphoid aggregates

</li></ul></div></div>
