<div class="block_section spbt_16" id="microscopichistologicdescription112140"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Degeneration and regeneration of muscle fibers associated with interstitial inflammation and fibrosis
</li><li> Also focal neurogenic changes
</li><li> Occasionally prominent eosinophils
</li><li> Markedly inflamed cases have B cells or CD123+ dendritic plasma cells

</li></ul>
</div></div>
