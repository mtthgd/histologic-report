<div class="block_section spbt_16" id="microscopichistologicdescription73581"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Poorly circumscribed amorphous or nodular deposits of abundant, hyaline material with embedded fibroblasts in cords
</li><li> Can have retraction artifact around fibroblasts
</li><li> Early lesions are characterized by increased cellularity
</li><li> No atypia, no necrosis
</li></ul></div></div>
