<div class="block_section spbt_16" id="microscopichistologicdescription497464"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Long tight spirals; thicker and twice as long as <i>H. pylori</i> and usually visible with H&amp;E stain

</li><li> Changes similar to but less severe than <i>H. pylori</i> gastritis (lymphoid aggregates, scant neutrophils)

</li></ul></div></div>
