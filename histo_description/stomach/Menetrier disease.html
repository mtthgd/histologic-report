<div class="block_section spbt_16" id="microscopichistologicdescription220738"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Marked foveolar hyperplasia, tortuous (corkscrew) and cystically dilated foveolar glands

</li><li> May extend into muscularis mucosa

</li><li> Atrophic glandular compartment

</li><li> Edematous and mildly inflamed lamina propria, may have increased intraepithelial lymphocytes

</li></ul></div></div>
