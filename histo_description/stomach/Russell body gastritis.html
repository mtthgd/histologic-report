<div class="block_section spbt_16" id="microscopichistologicdescription220230"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Plasma cell infiltrates with extensive formation of Russell bodies (Mott cells) within the lamina propria of the antral mucosa
</li><li>Intracytoplasmic inclusions, homogeneous, mainly round to oval, which push the nucleus toward the periphery

</li></ul></div></div>
