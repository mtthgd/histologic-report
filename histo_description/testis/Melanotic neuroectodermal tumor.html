<div class="block_section spbt_16" id="microscopichistologicdescription252971"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Appears to recapitulate retina at 5 weeks of gestation 
</li><li>Contains dual population of cells: neuroblastic cells with high nuclear cytoplasmic ratio and epithelioid cells containing melanin
</li><li>Mitoses may be present, usually in neuroblastic component

</li></ul></div></div>
