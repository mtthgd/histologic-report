<div class="block_section spbt_16" id="microscopichistologicdescription224653"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Tubulopapillary or cribriform proliferations of bland epithelium that projects into dilated channels of rete testis

</li><li>Associated with hyaline globules (represent proteins absorbed from lumen by epithelial lining cells)

</li></ul></div></div>
