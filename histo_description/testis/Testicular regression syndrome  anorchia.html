<div class="block_section spbt_16" id="microscopichistologicdescription224375"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li>Regressed testis indicated by fibrosis, hemosiderin, calcification or Leydig cells near epididymis or proximal vas deferens (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/10782149" target="_blank">Arch Pathol Lab Med 2000;124:694</a>)
  </li><li>  Presence of only fat and connective tissue does not rule out an intraabdominal testis 

</li></ul></div></div>
