<div class="block_section spbt_16" id="microscopichistologicdescription229321"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Dark brown, granular, dust-like cytoplasmic pigment abundant in apical portion of follicular cells, colloid and stromal macrophages (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/6435454" target="_blank">Am J Pathol 1984;117:98</a>)

</li><li> Pigment is nonfluorescent and nonbirefringent (<a class="gr" href="https://www.ncbi.nlm.nih.gov/pubmed/14987144" target="_blank">Arch Pathol Lab Med 2004;128:355</a>)

</li></ul></div></div>
