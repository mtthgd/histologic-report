<div class="block_section spbt_16" id="microscopichistologicdescription228716"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Focal aggregates of lymphocytes in inter- or intralobular fibrous tissue

</li><li> No oxyphilic metaplasia, no follicular atrophy, no follicular disruption

</li><li> May be associated with other thyroid disease

</li></ul></div></div>
