<div class="block_section spbt_16" id="microscopichistologicdescription228773"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Extensive dense (keloid-like) hyaline fibrosis within thyroid capsule
</li><li> Often extensive squamous metaplasia
</li><li> Marked follicular atrophy, although lobular architecture of gland is maintained 

</li></ul></div></div>
