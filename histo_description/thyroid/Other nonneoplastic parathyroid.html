<div class="block_section spbt_16" id="microscopichistologicdescription257609"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><span class="f12b">Parathyroid cyst</span><br/>
<ul>
<li> Lined by flattened parathyroid chief cells, oxyphils, clear cells; no nodules
</li><li> Cyst wall has uniform thickness
</li><li> May contain granular material resembling colloid
</li><li> No cholesterol granulomas, no cartilage, no smooth muscle
</li></ul></div></div>
