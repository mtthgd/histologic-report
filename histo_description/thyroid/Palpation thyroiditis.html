<div class="block_section spbt_16" id="microscopichistologicdescription228787"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Multiple small granulomas centered in disrupted follicles, composed of lymphocytes (usually T cells), macrophages (some foamy), occasional multinucleated giant cells associated with colloid breakdown, usually no necrosis, no neutrophils

</li></ul></div></div>
