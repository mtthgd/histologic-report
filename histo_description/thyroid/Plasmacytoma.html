<div class="block_section spbt_16" id="microscopichistologicdescription399573"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<!--
<li> Dense infiltrate of plasma cells replacing thyroid follicles

<li> Plasma cells often appear monotonous; may be mature, immature or anaplastic

<li> Mature plasma cells: basophilic cytoplasm and clock face nucleus

<li> Immature plasma cells: large irregular nuclei, less condensed chromatin and occasional nucleoli

<li> Anaplastic plasma cells: significant variation of nuclear size, coarse to vesicular nuclei and prominent nucleoli

<li> Also multinucleated cells, immunoglobulin inclusions (dutcher bodies or intracytoplasmic crystals)
-->

</li></ul></div></div>
