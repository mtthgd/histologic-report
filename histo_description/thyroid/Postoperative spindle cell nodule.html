<div class="block_section spbt_16" id="microscopichistologicdescription36772"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Spindle cell proliferation

</li><li> Bland cytology, no pleomorphism

</li><li> Low mitotic count, no atypical mitoses

</li><li> Other features may be seen as scattered inflammatory cells and histiocytes, focal myxoid change and delicate blood vessels

</li></ul></div></div>
