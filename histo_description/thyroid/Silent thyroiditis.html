<div class="block_section spbt_16" id="microscopichistologicdescription228883"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Preserved lobular pattern with follicular destruction, variable lymphocytic infiltrate, rare / no oncocytic change, no / focal fibrosis

</li><li> T cells present in paracortex, B cells predominate in germinal center

</li></ul>
