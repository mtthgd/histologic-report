<div class="block_section spbt_16" id="microscopichistologicdescription229286"><div class="topicheading_title">Microscopic (histologic) description</div><div class="block_body"><ul>
<li> Hyperplastic nodules with discrete fibrous capsule, composed of follicles with papillary hyperplasia and tall columnar cells

</li><li> Nonfunctioning nodules may appear inactive and have degenerative changes of fibrosis, calcification and hemorrhage (old and new)

</li></ul></div></div>
